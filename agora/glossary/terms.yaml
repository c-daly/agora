yield_curve:
  term: Yield Curve
  description: >
    A line that plots the interest rates of U.S. Treasury bonds across different
    maturities, from short-term (e.g. 3 months) to long-term (e.g. 30 years).
    In a healthy economy the curve slopes upward, meaning longer-term bonds pay
    higher yields to compensate investors for tying up their money longer.
  interpretation: >
    A steep upward slope suggests investors expect strong economic growth and
    possibly rising inflation ahead. A flat curve signals uncertainty or a
    transition period. Watching how the curve changes over weeks and months can
    give you an early read on where the economy and interest rates may be headed.
  caveats: >
    The yield curve reflects market expectations, not guarantees. Central bank
    policy (like quantitative easing) can distort the curve, making it less
    reliable as a pure economic signal. Always consider it alongside other
    indicators.

inversion:
  term: Yield Curve Inversion
  description: >
    A situation where short-term Treasury bonds pay higher yields than
    long-term bonds, flipping the normal upward slope of the yield curve.
    The most-watched version compares the 2-year Treasury yield to the
    10-year Treasury yield.
  interpretation: >
    An inversion has historically preceded most U.S. recessions, often by
    12 to 24 months. When it occurs, it means investors are so worried about
    the near-term economy that they are willing to accept lower returns on
    long-term bonds in exchange for safety. A deeper or longer-lasting
    inversion is generally viewed as a stronger warning sign.
  caveats: >
    Not every inversion leads to a recession, and the lag between inversion
    and an actual downturn varies widely. The signal can be distorted by
    foreign demand for U.S. Treasuries or unconventional Fed policy. It is
    a useful warning, not a precise countdown timer.

spread:
  term: Spread
  description: >
    The difference in yield (interest rate) between two bonds or two
    points on the yield curve, expressed in basis points (hundredths of a
    percent). Common examples include the 2-year/10-year Treasury spread
    and the corporate bond spread over Treasuries.
  interpretation: >
    A narrowing spread between Treasuries of different maturities can signal
    slowing growth expectations. A widening corporate-to-Treasury spread
    suggests rising credit risk, meaning investors are demanding more
    compensation to hold riskier debt. Sudden moves in spreads often precede
    broader market shifts.
  caveats: >
    Spreads are relative measures, so the absolute yield levels matter too.
    A tight spread in a low-rate environment means something different than
    the same spread when rates are high. Always note which two instruments
    are being compared.

ftd:
  term: Fails-to-Deliver (FTD)
  description: >
    Instances where a seller of a security does not deliver the shares to
    the buyer by the required settlement date. The SEC publishes FTD data
    for all equity securities on a two-week delay.
  interpretation: >
    Elevated FTD numbers for a stock can indicate high demand, possible
    naked short selling, or operational settlement issues. Persistent,
    large FTDs may suggest that shares are hard to locate or borrow,
    which can contribute to upward price pressure if buyers force
    delivery.
  caveats: >
    FTD data is reported with a delay and reflects gross (not net)
    failures on a given day. A single spike may be an administrative
    glitch rather than a sign of manipulation. Context matters -- compare
    FTDs to the stock's average daily volume before drawing conclusions.

short_interest:
  term: Short Interest
  description: >
    The total number of shares of a stock that have been sold short and
    have not yet been covered (bought back). It is typically reported
    twice a month by exchanges.
  interpretation: >
    High short interest relative to a stock's float (shares available for
    trading) indicates that many investors are betting the price will fall.
    A short interest ratio above 20% of the float is often considered
    elevated. If the stock price rises instead, short sellers may be forced
    to buy back shares quickly, creating a "short squeeze" that accelerates
    the rally.
  caveats: >
    Short interest data is published with a delay of roughly two weeks, so
    it may not reflect current positioning. High short interest alone does
    not mean a squeeze will happen -- it requires a catalyst. Some stocks
    have persistently high short interest without dramatic price moves.

short_volume_ratio:
  term: Short Volume Ratio
  description: >
    The percentage of a stock's daily trading volume that consists of
    short sales, calculated by dividing short sale volume by total volume
    for a given day. Data is published daily by FINRA and exchanges.
  interpretation: >
    A short volume ratio above 50% means more than half of the day's
    trades were short sales, which can signal bearish sentiment or active
    hedging by market makers. Tracking the ratio over time can reveal
    whether short-selling pressure is increasing or decreasing.
  caveats: >
    Short volume is not the same as short interest. Much of the daily
    short volume comes from market makers who short as part of normal
    liquidity provision and cover within the same day. A high short
    volume ratio does not necessarily mean new bearish bets are being
    placed.

gdp:
  term: Gross Domestic Product (GDP)
  description: >
    The total dollar value of all finished goods and services produced
    within a country's borders over a specific period, usually reported
    quarterly. It is the broadest measure of overall economic activity.
  interpretation: >
    Positive GDP growth indicates an expanding economy, while negative
    growth signals contraction. Two consecutive quarters of negative GDP
    growth is a common (though informal) definition of a recession.
    Quarter-over-quarter changes and the trend over several quarters
    matter more than any single reading.
  caveats: >
    GDP is reported with a significant lag and is revised multiple times
    after the initial estimate. It does not capture the underground
    economy, unpaid work, or income inequality. A strong GDP number can
    mask weakness in specific sectors.

cpi:
  term: Consumer Price Index (CPI)
  description: >
    A measure of the average change over time in the prices paid by
    urban consumers for a basket of common goods and services such as
    food, housing, transportation, and medical care. Published monthly
    by the Bureau of Labor Statistics.
  interpretation: >
    Rising CPI indicates inflation -- your purchasing power is shrinking.
    The year-over-year percentage change is the most commonly cited
    figure. "Core CPI" strips out volatile food and energy prices to
    show the underlying trend. The Federal Reserve watches CPI closely
    when deciding whether to raise or lower interest rates.
  caveats: >
    CPI measures a fixed basket that may not match your personal spending
    habits. Housing costs use an "owners' equivalent rent" method that
    can lag actual market rents. CPI also does not directly capture
    asset price inflation (stocks, real estate investment values).

unemployment_rate:
  term: Unemployment Rate
  description: >
    The percentage of the labor force that is actively looking for work
    but currently without a job. Published monthly by the Bureau of Labor
    Statistics as part of the Employment Situation report.
  interpretation: >
    A falling unemployment rate generally signals a strengthening economy
    and can support stock prices. A rising rate may foreshadow recession
    and often leads the Federal Reserve to consider cutting interest rates.
    The rate tends to be a lagging indicator, meaning it confirms a trend
    rather than predicting one.
  caveats: >
    The headline rate (U-3) does not count people who have stopped looking
    for work or those working part-time who want full-time jobs. The
    broader U-6 measure captures these groups. A low unemployment rate
    can coexist with stagnant wages or underemployment.

federal_funds_rate:
  term: Federal Funds Rate
  description: >
    The target interest rate set by the Federal Reserve at which banks
    lend their excess reserves to each other overnight. It is the Fed's
    primary tool for steering the economy and is decided at Federal Open
    Market Committee (FOMC) meetings, typically held eight times a year.
  interpretation: >
    When the Fed raises the rate, borrowing becomes more expensive across
    the economy, which tends to slow growth and cool inflation. When it
    cuts the rate, borrowing gets cheaper, stimulating spending and
    investment. Stock markets often react strongly to rate decisions and
    even to hints about future moves (forward guidance).
  caveats: >
    The fed funds rate is a target range, not a single fixed number.
    Changes take months to fully ripple through the economy (the "lag
    effect"). Market expectations for future rate moves, priced into
    fed funds futures, can be as important as the current rate itself.

treasury_yields:
  term: Treasury Yields
  description: >
    The annualized return an investor earns by holding a U.S. Treasury
    security to maturity. Treasuries are issued at various maturities --
    common benchmarks include the 2-year, 5-year, 10-year, and 30-year.
    They are considered virtually risk-free because they are backed by
    the U.S. government.
  interpretation: >
    Rising yields mean bond prices are falling, which can signal
    expectations of stronger growth or higher inflation. Falling yields
    suggest investors are seeking safety or expect the economy to weaken.
    The 10-year yield is especially important because it influences
    mortgage rates, corporate borrowing costs, and stock valuations.
  caveats: >
    "Risk-free" refers to credit risk only; Treasury prices still
    fluctuate with interest rate changes, so you can lose money if you
    sell before maturity. Yields can be pushed around by global demand
    (e.g. foreign central banks buying U.S. debt) in ways that do not
    purely reflect domestic economic conditions.

maturity:
  term: Maturity
  description: >
    The date on which a bond's principal (face value) is repaid to the
    investor and the bond ceases to exist. Maturity length can range from
    a few weeks (Treasury bills) to 30 years (long-term Treasury bonds).
  interpretation: >
    Longer-maturity bonds are more sensitive to interest rate changes,
    meaning their prices swing more when rates move. Investors choosing
    between maturities are balancing higher yield (usually available at
    longer maturities) against greater price risk and less flexibility.
  caveats: >
    Maturity alone does not tell you the full risk picture. Duration,
    a related measure, accounts for coupon payments and gives a better
    sense of a bond's price sensitivity to rate changes. Callable bonds
    may be redeemed before their stated maturity.

basis_point:
  term: Basis Point
  description: >
    A unit of measurement equal to one hundredth of a percentage point
    (0.01%). Used widely in finance to describe changes in interest rates,
    bond yields, and spreads. For example, a move from 4.50% to 4.75%
    is an increase of 25 basis points.
  interpretation: >
    Basis points remove ambiguity when discussing rate changes. Saying a
    rate "rose 50 basis points" is clearer than saying it "rose half a
    percent," which could be confused with a 50% relative increase.
    Even small basis-point moves in Treasury yields or the fed funds rate
    can have large effects on mortgages, corporate debt, and stock
    valuations.
  caveats: >
    Basis points are a unit of convenience, not a measure of significance.
    A 25-basis-point move matters much more when the starting rate is 1%
    than when it is 10%. Always consider the percentage change in context.

duration:
  term: Duration
  description: >
    A measure of a bond's sensitivity to changes in interest rates,
    expressed in years. It estimates how much a bond's price will change
    for a 1-percentage-point move in yields. A bond with a duration of
    5 years would lose roughly 5% in price if yields rise by 1%.
  interpretation: >
    Higher duration means more interest rate risk. When you expect rates
    to fall, longer-duration bonds offer bigger price gains. When you
    expect rates to rise, shorter-duration bonds offer more protection.
    Duration is a key tool for comparing bonds of different maturities
    and coupon rates on an apples-to-apples basis.
  caveats: >
    Duration is an approximation that assumes a small, parallel shift in
    rates. For larger moves, convexity (the rate of change of duration)
    also matters. Modified duration and effective duration differ in how
    they handle callable or variable-rate bonds.

quantitative_easing:
  term: Quantitative Easing (QE)
  description: >
    A monetary policy tool where the Federal Reserve (or another central
    bank) buys large quantities of government bonds and other securities
    on the open market to inject money into the economy and push down
    long-term interest rates.
  interpretation: >
    QE is typically deployed when short-term rates are already near zero
    and the economy still needs stimulus. It tends to boost asset prices
    (stocks, bonds, real estate) by flooding the financial system with
    liquidity. The reverse process, known as quantitative tightening (QT),
    involves the Fed reducing its holdings, which can put upward pressure
    on yields.
  caveats: >
    QE can distort normal market signals by suppressing yields below where
    they would naturally be. Its long-term effects on inflation and
    financial stability are still debated among economists. The
    announcement of tapering (slowing QE purchases) can itself cause
    market volatility.
