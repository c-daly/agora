eval: eval/
id: edgar_insider_adapter
issue: 12
objective: 'Build an SEC EDGAR Form 4 insider transaction adapter.


  Must:

  1. Fetch recent insider transactions (buys, sells, exercises) for a given ticker

  2. Return as agora.schemas.Transaction objects

  3. Include insider name, title, transaction type, shares, price

  4. Support date range filtering

  5. Respect SEC rate limits (10 req/sec, User-Agent required)

  6. Handle companies with no recent insider activity


  EDGAR full-text search API or RSS feeds for Form 4 filings.

  '
success_criteria:
- metric: test_pass_rate
  primary: true
  threshold: 1.0
target: agora/adapters/edgar_insider_adapter.py
