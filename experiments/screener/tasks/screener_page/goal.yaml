depends_on:
- batch_scoring_api
eval: eval/
id: screener_page
objective: 'Build a screener page in the React app.


  - Default tickers: QS, GME, AMC, TSLA, AAPL, SPY, NVDA, PLTR

  - Table with columns: Ticker, Composite Score, Signal, Short Vol Score, SI Score,
  FTD Score

  - Sortable by any column (click header to sort)

  - Color-coded signal badges (red=extreme, orange=high, yellow=moderate, green=low)

  - Each ticker links to /symbol/{ticker} deep dive

  - Input field to add custom tickers to the list

  - Loading state per-row (scores come back as they''re computed)

  - Add route /screener to the React app

  - Add "Screener" nav link in the header

  '
success_criteria:
- metric: test_pass_rate
  primary: true
  threshold: 1.0
target: webapp/src/pages/Screener.tsx
