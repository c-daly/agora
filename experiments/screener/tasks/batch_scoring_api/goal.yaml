eval: eval/
id: batch_scoring_api
objective: "Add a screener API endpoint that scores multiple tickers at once.\n\n\
  Route: GET /api/screener?tickers=QS,GME,AMC,BBBY,TSLA,AAPL,SPY\n\nFor each ticker:\n\
  1. Fetch short volume, short interest, and FTD data\n2. Run short_composite scoring\n\
  3. Return sorted results (highest composite score first)\n\nResponse shape:\n{\n\
  \  \"data\": [\n    {\"ticker\": \"QS\", \"composite_score\": 69.3, \"signal\":\
  \ \"high\", \"components\": {...}},\n    ...\n  ],\n  \"count\": 7\n}\n\nMount as\
  \ route on existing FastAPI app.\nHandle individual ticker failures gracefully \u2014\
  \ skip and continue.\nTimeout per ticker to prevent one slow adapter from blocking\
  \ everything.\n"
success_criteria:
- metric: test_pass_rate
  primary: true
  threshold: 1.0
target: agora/api/screener.py
