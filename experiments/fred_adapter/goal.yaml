objective: |
  Build a FRED (Federal Reserve Economic Data) adapter for Agora.

  The adapter must:
  1. Fetch any FRED time series by series ID
  2. Return data as agora.schemas.TimeSeries objects with metadata.source="FRED"
  3. Support filtering by date range
  4. Handle errors gracefully — bad API keys, invalid series IDs, network failures
     should raise descriptive exceptions, not crash or return malformed data
  5. Skip missing/unavailable observations rather than returning bad values

  The FRED API key is available via the FRED_API_KEY environment variable.
  FRED API documentation: https://fred.stlouisfed.org/docs/api/fred/

target: agora/adapters/fred_adapter.py

context: |
  Agora is a financial intelligence platform that aggregates free data sources.
  FRED is the first adapter — it provides macroeconomic time series data (GDP, CPI,
  unemployment, interest rates, money supply, etc.).

  The common data schemas are defined in agora/schemas/models.py.

success_criteria:
  - metric: test_pass_rate
    threshold: 1.0
    primary: true
    description: All pytest tests in eval/ must pass

eval: eval/

environment:
  FRED_API_KEY: ${FRED_API_KEY}
