objective: |
  Build the FRED (Federal Reserve Economic Data) adapter module.

  The adapter should:
  1. Fetch any FRED series by series ID via the FRED REST API
  2. Return a list of TimeSeries objects matching the agora.schemas.TimeSeries schema
  3. Handle API errors gracefully (bad key, invalid series, network errors) — raise
     descriptive exceptions, never crash silently or return malformed data
  4. Respect FRED rate limits (120 requests/min) with simple throttling
  5. Support date range filtering (start_date, end_date parameters)

  The module lives at agora/adapters/fred_adapter.py and should expose:
  - fetch_series(series_id: str, api_key: str, start_date: date | None, end_date: date | None) -> list[TimeSeries]

  The FRED API base URL is https://api.stlouisfed.org/fred/series/observations
  with parameters: series_id, api_key, file_type=json, observation_start, observation_end.

  Response format: {"observations": [{"date": "YYYY-MM-DD", "value": "123.456"}, ...]}
  Note: FRED returns value as a string. Missing values are represented as ".".

target: agora/adapters/fred_adapter.py

success_criteria:
  - metric: test_pass_rate
    threshold: 1.0
    primary: true
    description: All pytest tests in eval/ must pass

context: |
  Agora is a financial intelligence platform that aggregates free data sources.
  FRED is the first adapter — it provides macroeconomic time series data (GDP, CPI,
  unemployment, interest rates, money supply, etc.).

  The common schema is defined in agora/schemas/models.py. The adapter must return
  TimeSeries objects with metadata.source="FRED".

  The FRED API key is available via the FRED_API_KEY environment variable.

environment:
  FRED_API_KEY: ${FRED_API_KEY}
