description: "Agora POC \u2014 vertical slice from data to UI"
tasks:
- id: api_routes
  target: agora/api/routes.py
  objective: 'Build FastAPI routes serving yield curve, FTD, and FRED data.


    Routes:

    - GET /api/yields?maturities=10yr,2yr&start_date=2024-01-01&end_date=2024-03-31

    - GET /api/yields/curve (latest yield curve)

    - GET /api/yields/spread?long=10yr&short=2yr&start_date=...&end_date=...

    - GET /api/yields/inversions

    - GET /api/ftd?symbol=GME&start_date=2024-01-01&end_date=2024-01-31

    - GET /api/fred?series_id=GDP&start_date=2020-01-01

    - GET /api/glossary

    - GET /api/glossary/{term}


    Consumes existing adapters (fred_adapter, treasury_adapter, sec_ftd_adapter)

    and analysis modules (yield_curve) directly.


    JSON responses should be structured for frontend consumption.

    Handle errors with proper HTTP status codes and JSON error bodies.

    '
  issue: 2
- id: glossary_data
  target: agora/glossary/terms.yaml
  objective: "Create the glossary data file \u2014 a static YAML mapping term keys\
    \ to definitions.\n\nEach entry has:\n- term: display name\n- description: what\
    \ it is, in plain English\n- interpretation: what's high, what's low, what to\
    \ watch for\n- caveats: known limitations or common misreadings\n\nCover terms\
    \ for: yield curve, inversion, spread, FTD (fails-to-deliver),\nshort interest,\
    \ short volume ratio, GDP, CPI, unemployment rate,\nfederal funds rate, Treasury\
    \ yields, maturity.\n\nMinimum 15 terms. Write for a retail investor audience.\n"
  issue: 3
- id: webapp_scaffold
  target: webapp/
  depends_on:
  - api_routes
  objective: "Create a React app with an interactive yield curve visualization.\n\n\
    - React 18+ with Vite as build tool\n- Recharts for charting\n- Fetch data from\
    \ the FastAPI backend (proxy /api to localhost:8000)\n- Yield curve chart: current\
    \ curve (maturity x yield), with date slider\n- 10yr-2yr spread time series chart\n\
    - Inversion highlighting (red when inverted)\n- Clean, minimal design \u2014 this\
    \ is a POC, not a polished product\n\nThe webapp/ directory should be self-contained\
    \ (its own package.json, vite config).\n"
  issue: 4
- id: ftd_heatmap
  target: webapp/src/components/FtdHeatmap.tsx
  depends_on:
  - api_routes
  - webapp_scaffold
  objective: 'Build an FTD heatmap component.


    - Heatmap: symbol x date, color intensity = FTD quantity

    - Allow searching/filtering by symbol

    - Fetch from GET /api/ftd

    - Handle empty data gracefully (show message, not blank)

    - Use Recharts or a simple HTML table with colored cells

    '
  issue: 5
- id: macro_grid
  target: webapp/src/components/MacroGrid.tsx
  depends_on:
  - api_routes
  - webapp_scaffold
  objective: 'Build a macro indicator grid component.


    - Grid of key FRED indicators: GDP, CPI, unemployment, fed funds rate

    - Each cell: indicator name, current value, sparkline (last 12 data points)

    - Fetch from GET /api/fred for each series

    - Use Recharts sparkline component

    - Handle loading and error states

    '
  issue: 6
- id: glossary_tooltips
  target: webapp/src/components/GlossaryTooltip.tsx
  depends_on:
  - glossary_data
  - webapp_scaffold
  objective: "Wire glossary data into UI components as tooltips.\n\n- GlossaryTooltip\
    \ component: wraps any text, shows tooltip on hover\n- Fetches glossary data from\
    \ GET /api/glossary\n- Cache glossary client-side (fetch once, reuse)\n- Integrate\
    \ into yield curve chart axis labels, macro grid headers,\n  and FTD heatmap column\
    \ headers\n- Tooltip shows: term name, description, interpretation\n"
  issue: 7
success_criteria:
- metric: test_pass_rate
  threshold: 1.0
  primary: true
  description: All pytest and vitest/jest tests must pass
on_failure: continue
