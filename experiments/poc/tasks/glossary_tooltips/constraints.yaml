interface_contracts:
  file: webapp/src/components/GlossaryTooltip.tsx
  framework: React
  component:
    name: GlossaryTooltip
    description: "Wraps any text element and shows a glossary tooltip on hover"
    props:
      - name: term
        type: string
        required: true
        description: "The glossary term key to look up"
      - name: children
        type: ReactNode
        required: true
        description: "The text/element to wrap with the tooltip"
    features:
      - "Fetches glossary data from GET /api/glossary"
      - "Caches glossary data client-side (fetch once, reuse across instances)"
      - "Shows tooltip on hover with: term name, description, interpretation"
      - "Integrates into yield curve chart axis labels"
      - "Integrates into macro grid headers"
      - "Integrates into FTD heatmap column headers"
    data_source:
      endpoint: "GET /api/glossary"
      caching: "Client-side, fetch once on first mount"

do_not_do:
  - "Do not fetch glossary data on every tooltip mount — cache after first fetch"
  - "Do not crash if a term key is not found in the glossary — show children without tooltip"

escalate_if: []

known_findings: []
