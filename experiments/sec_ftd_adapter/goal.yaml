objective: |
  Build an SEC Fails-to-Deliver adapter for Agora.

  The adapter must:
  1. Download and parse SEC FTD flat files (pipe-delimited, published twice monthly)
  2. Return data as agora.schemas.ShortData objects with data_type="ftd" and source="SEC"
  3. Support filtering by symbol and date range
  4. Handle malformed rows gracefully — skip and continue, don't crash
  5. Normalize CUSIP-only rows by looking up the ticker from the file's own data
     (SEC files include both CUSIP and symbol columns)
  6. Handle the SEC's two-file-per-month publishing schedule
     (first half available at month end, second half ~15th of next month)

  SEC FTD files are available at:
  https://www.sec.gov/data/foiadata/failsdata/

target: agora/adapters/sec_ftd_adapter.py

context: |
  Agora is a financial intelligence platform aggregating free data sources.
  SEC FTD data is a key input for short selling analysis — persistent fails-to-deliver
  can indicate naked shorting or settlement issues.

  The common data schemas are defined in agora/schemas/models.py.
  The ShortData model has: symbol, date, data_type, value, total_for_ratio, source.

  FTD files are pipe-delimited with columns:
  SETTLEMENT DATE|CUSIP|SYMBOL|QUANTITY (FAILS)|DESCRIPTION|PRICE

success_criteria:
  - metric: test_pass_rate
    threshold: 1.0
    primary: true
    description: All pytest tests in eval/ must pass

eval: eval/

environment: {}
